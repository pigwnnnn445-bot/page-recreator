<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Stack of books -->
  <rect x="6" y="34" width="36" height="5" rx="1.5" fill="#E74C3C"/>
  <rect x="7" y="28" width="34" height="5" rx="1.5" fill="#3498DB"/>
  <rect x="6" y="22" width="36" height="5" rx="1.5" fill="#1ABC9C"/>
  <rect x="7" y="16" width="34" height="5" rx="1.5" fill="#F39C12"/>
  <rect x="6" y="10" width="36" height="5" rx="1.5" fill="#2ECC71"/>
  <!-- Top notebook -->
  <rect x="10" y="4" width="28" height="7" rx="1.5" fill="#F5E6CA" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="24" y="9.5" text-anchor="middle" font-size="5" font-weight="bold" fill="#7F8C8D" font-family="sans-serif">21</text>
  <!-- Book stripes -->
  <line x1="8" y1="36.5" x2="40" y2="36.5" stroke="#C0392B" stroke-width="0.5" opacity="0.3"/>
  <line x1="9" y1="30.5" x2="39" y2="30.5" stroke="#2980B9" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="24.5" x2="40" y2="24.5" stroke="#16A085" stroke-width="0.5" opacity="0.3"/>
  <line x1="9" y1="18.5" x2="39" y2="18.5" stroke="#E67E22" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="12.5" x2="40" y2="12.5" stroke="#27AE60" stroke-width="0.5" opacity="0.3"/>
</svg>
